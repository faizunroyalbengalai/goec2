---
# Thin Ansible orchestrator for EC2.
# All runtime-specific behavior lives in `runtimes/<runtime>/*.yml.j2` so that
# editing one language's playbook (e.g. python) cannot affect any other.
- name: Deploy goecc2
  hosts: all
  become: true
  gather_facts: yes
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 3000
    project: 'goecc2'
    web_server: 'nginx'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded

    # ── Go runtime ────────────────────────────────────────────────────────────
    # Go binary is built in CI and uploaded; nothing to install on the host.

    # ── Local database installation ───────────────────────────────────────────
    - name: Install MySQL server
      apt:
        name:
          - mysql-server
        state: present
        update_cache: yes

    - name: Ensure MySQL is started
      systemd:
        name: mysql
        state: started
        enabled: yes

    - name: Wait for MySQL to be ready
      wait_for:
        port: 3306
        host: 127.0.0.1
        timeout: 60

    - name: Create MySQL database and user
      shell: |
        DB_NAME="{{ deploy_db_name | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ deploy_db_username | default('appuser', true) }}"
        DB_PASS="{{ deploy_db_password | default('apppass', true) }}"
        mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\`;"
        mysql -u root -e "CREATE USER IF NOT EXISTS '$DB_USER'@'localhost' IDENTIFIED BY '$DB_PASS';"
        mysql -u root -e "ALTER USER '$DB_USER'@'localhost' IDENTIFIED BY '$DB_PASS';"
        mysql -u root -e "GRANT ALL PRIVILEGES ON \`$DB_NAME\`.* TO '$DB_USER'@'localhost';"
        mysql -u root -e "FLUSH PRIVILEGES;"
      args:
        executable: /bin/bash


    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Find uploaded Go binary
      find:
        paths: "{{ app_dir }}"
        patterns: "app"
        file_type: file
      register: go_bin_search

    - name: Fail if no Go binary found
      fail:
        msg: "No Go binary 'app' found in {{ app_dir }}. Did the CI build step run?"
      when: go_bin_search.files | length == 0

    - name: Mark Go binary executable
      file:
        path: "{{ app_dir }}/app"
        mode: '0755'

    - name: Create systemd service for Go app
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} Go app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          Environment=PORT={{ app_port }}
          ExecStart={{ app_dir }}/app
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start Go service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start web server
      service:
        name: "{{ 'apache2' if (web_server or 'nginx').lower() == 'apache' else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
